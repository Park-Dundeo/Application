      time: "정기 연습 + 주일 예배 — 과도한 추가 헌신은 교역자와 협의"
      role: "교사로서 가르치되, 학생의 자리를 빼앗지 않기"
      value: "완성도보다 성장 — 학생이 실수해도 스스로 해보게 두기"

    # 9. 이양 조건
    handoff_condition: "학생 중 예배를 자립적으로 이끌 수 있는 리더가 세워질 때"

