  # ----------------------------------------------------------
  - id: youth_educator
    project_type: mission
    name: "청소년 교육자"
    budget_items: ["도서"]
    monthly: 0
    note: "학습 자료비는 4층 자기계발(도서)에서, 별도 예산 필요 시 조정"

    # === 프레임 헌장 ===

    # 1. 부르심/미션
    calling: >
      현업에서 살아가는 사람으로서, 중고등부 아이들 곁에 있는 교사.
      불완전하고 애매한 시기를 지나는 청소년들을 판단 없이 애정으로 바라보고,
      관계 안에서 세우며, 복음을 현실 언어로 번역해 전달한다.
      찬양팀 교사이자 중고등부 교사로서의 역할을 통합하되,
      전문성(청소년 이해 + 기독교 영적 돌봄)으로 그 마음을 체계화해 간다.
      직장인으로 세상을 살아가는 모습 자체가 아이들에게 또 하나의 복음의 언어다.

    # 2. 구함(분별) 방식
    discernment:
      method: "기도 + 아이들과의 관계 흐름 관찰 + 교역자와 소통"
      community: "중고등부 교역자, 교사 공동체"

    # 3. 동행의 형태
    companionship: "주일 현장에서 아이들과 함께 있기 + 관계 흐름 읽기 + 꾸준한 학습"

    # 4. 변환 루틴
    practice_template:
      - "24주 커리큘럼 진행 (청소년 이해 60% + 기독교 영적 돌봄 40%)"
      - "아이들의 반응과 관계 흐름 관찰 → 배운 개념과 연결해 보기"
      - "학기별 교사로서의 나의 변화 회고"

    # 5. 열매 증거
    fruit_evidence:
      qualitative: "아이들과의 대화가 더 정확해지고, 영적인 말이 공허하지 않게 전달되는 것"
      quantitative: "24주 커리큘럼 완주, 학기별 회고 기록"

    # 6. 파송/위임 단계
    delegation:
      current: "배우면서 섬기는 단계"
      track: "학습 → 현장 적용 → 다른 교사에게 나눌 수 있는 단계"

    # 7. 회고 리듬
    review_rhythm: "학기 단위 (3월, 9월) — 커리큘럼 진행 현황 + 아이들과의 관계 변화"

    # 8. 경계
    boundaries:
      money: "도서 및 강의 자료비 — 4층 자기계발에서 집행"
      time: "학습은 주 1~2시간 내, 번아웃 없이 오래 가는 리듬"
      role: "전문가 흉내가 아닌, 더 잘 사랑하기 위한 공부"
      value: "이론을 가르치는 교사가 아닌, 관계로 세우는 사람"

    # 9. 이양 조건
    handoff_condition: "아이들이 스스로 서고, 나의 역할이 뒤로 물러날 때"

    # 10. 종료/전환 조건
    exit_condition: "부서 이동 또는 하나님의 다른 인도하심"

    # === Gate 상태 ===

    gates:
      A_seed:
        status: "통과"
        evidence: "중고등부 찬양팀 교사로 섬기며 아이들과의 관계에서 소명을 확인함 (2026-03)"

      B_grow:
        status: "분별 중"
        question: "청소년 이해와 영적 돌봄 역량을 쌓아가면서, 나는 어떤 교사로 자라고 있는가?"
        possible_paths:
          - id: learning_curriculum
            name: "24주 커리큘럼 완주"
            description: "청소년이해론 + 기독교 영적 돌봄 체계적 학습"
            investment: "시간"
          - id: relational_depth
            name: "관계 깊이 확장"
            description: "특정 학생들과 더 깊은 관계 형성 — 상담적 대화 연습"
            investment: "시간+관계"
          - id: teacher_community
            name: "교사 공동체 참여"
            description: "다른 교사들과 배운 것 나누고 함께 성장"
            investment: "시간"
        discernment_method: "기도 + 학기별 회고"

      C_handoff:
        status: "미도달"

    # === 당장 액션 ===

    next_actions:
      - "KOCW 청소년이해론 수강 시작 (24주 커리큘럼 1단계)"
      - "아이들의 반응 패턴 관찰 — 또래관계, 인정욕구, 방어기제 연결해보기"
      - "교역자와 교사로서의 역할 범위 대화"

    # === 일정 ===
    schedule:
      - label: "청소년 교육자 학기 회고"
        freq: biannual
        months: [3, 9]
        track: calendar
        calendar_title: "청소년 교육자 학기 회고"

